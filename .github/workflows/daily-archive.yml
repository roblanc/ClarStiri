name: Daily News Archiver

on:
  schedule:
    # Rulează în fiecare zi la miezul nopții (ora 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite rularea manuală din interfața GitHub

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permisiune pentru a face push înapoi în repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Archive Seeder
        run: python scripts/archive_seeder.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/archives/*.json
          # Verificăm dacă sunt modificări înainte de commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(archive): automated daily news archive update [skip ci]"
            git push origin main
          fi
